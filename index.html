<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rain</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
      touch-action: none;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #root {
      position: absolute;
      width: 100vw;
      height: 100vh;
      top: 0;
      left: 0;
    }
    #canvas {
      width: 100%;
      height: 100%;
      transform-origin: 0 0;
    }
    #loading {
      position: absolute;
      z-index: 999;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      position: relative;
    }
    .spinner::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border: 2px solid #00fffc;
      border-radius: 50%;
      animation: neonRipple 2s ease-out infinite;
      box-shadow: 0 0 10px #00fffc, inset 0 0 10px #00fffc;
    }
    @keyframes neonRipple {
      0% { transform: scale(0.1); opacity: 1; filter: brightness(1); }
      100% { transform: scale(1.8); opacity: 0; filter: brightness(2); }
    }

    /* Control Panel */
    .control-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.20);
      border-radius: 15px;
      padding: 20px;
      color: white;
      width: 350px;
      backdrop-filter: blur(5px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      z-index: 100;
      transition: transform 0.3s ease, opacity 0.3s ease;
      transform: translateX(calc(100% - 40px));
      opacity: 0;
      box-sizing: border-box;
    }

    .control-panel.show {
      transform: translateX(0);
      opacity: 1;
    }

    .control-panel::after {
      content: '⚙️';
      position: absolute;
      left: -40px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 24px;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.3s ease;
    }

    .control-panel.show::after {
      opacity: 0;
    }

    .control-group {
      margin-bottom: 0;
      gap: 3px;
    }

    .control-label {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
      font-size: 14px;
      width: 100%;
    }

    .slider {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #333;
      outline: none;
      -webkit-appearance: none;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #dad9f5;
      cursor: pointer;
    }

    .slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #dad9f5;
      cursor: pointer;
      border: none;
    }

    .toggle-button {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .toggle-button:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .toggle-button.active {
      background: rgba(255, 255, 255, 0.2);
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0 0 5px 0;
      font-size: 24px;
    }

    .header p {
      margin: 0;
      font-size: 12px;
      opacity: 0.8;
    }

    .presets {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 15px;
    }

    .preset-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s ease;
      font-weight: 500;
    }
    .preset-btn.active {
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 0 1px #cacaca;
    }

    .preset-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .preset-btn:active {
      transform: scale(0.95);
    }

    #fullscreenBtn {
      padding: 10px 15px;
    }

    #videoControls {
      display: none;
    }

    #videoProgressGroup {
      display: none;
    }

    #videoProgress {
      cursor: pointer;
    }

    #mistToggle {
      min-width: 60px;
      text-align: center;
      white-space: nowrap;
    }

    #videoUrlInput {
      font-size: 12px;
    }

    #videoUrlInput::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    #videoUrlInput:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 0 1px #cacaca;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
      20%, 40%, 60%, 80% { transform: translateX(8px); }
    }

    .control-panel.shake {
      animation: shake 0.5s ease-in-out;
    }

    #dropzone {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      background: rgba(0,0,0,0.7);
      z-index: 500;
      justify-content: center;
      align-items: center;
    }

    #dropzone.active {
      display: flex;
    }

    .drop-content {
      padding: 30px;
      background: rgba(0,0,0,0.8);
      border-radius: 15px;
      border: 2px dashed white;
      color: white;
      font-size: 20px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .control-panel {
        max-width: calc(100vw - 40px);
        left: 20px;
        right: 20px;
        top: auto;
        bottom: 20px;
        transform: translateY(calc(100% - 40px));
      }

      .control-panel::after {
        left: 50%;
        top: -40px;
        transform: translateX(-50%);
      }

      .control-panel:hover,
      .control-panel:focus-within {
        transform: translateY(0);
      }

      .header h1 {
        font-size: 20px;
      }

      .presets {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="canvas-wrapper" style="position:absolute; top:0; left:0; width:100%; height:100%; overflow:hidden;">
      <canvas id="canvas"></canvas>
    </div>
    
    <div id="loading">
      <div class="spinner"></div>
    </div>

    <div id="dropzone">
      <div class="drop-content">
        <i class="fas fa-cloud-upload-alt" style="font-size: 48px; margin-bottom: 15px;"></i>
        <br><span id="dropzoneText">Drop Image Here</span>
      </div>
    </div>

    <!-- Hidden video element for video backgrounds -->
    <video id="backgroundVideo" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;" crossorigin="anonymous"></video>

    <div class="control-panel" tabindex="0">
      <div class="header">
        <h1><i class="fas fa-tint"></i> Raindrop FX</h1>
      </div>

      <div class="control-group">
        <button class="preset-btn" id="fullscreenBtn" style="width: 100%; grid-column: 1 / -1; margin-bottom: 10px;">
          <i class="fas fa-expand"></i> Enter Fullscreen
        </button>
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>Rain Intensity</span>
          <span id="dropletsPerSecondValue">1000</span>
        </div>
        <input type="range" min="100" max="3000" value="1000" class="slider" id="dropletsPerSecond">
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>Rain Size</span>
          <span id="spawnSizeValue">[30, 80]</span>
        </div>
        <input type="range" min="10" max="150" value="55" class="slider" id="spawnSize">
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>Slip Rate</span>
          <span id="slipRateValue">0.50</span>
        </div>
        <input type="range" min="0" max="100" value="50" class="slider" id="slipRate">
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>Gravity</span>
          <span id="gravityValue">2400</span>
        </div>
        <input type="range" min="1000" max="5000" value="2400" class="slider" id="gravity">
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>Mist Effect</span>
          <button id="mistToggle" class="toggle-button active">ON</button>
        </div>
      </div>

      <div class="control-group">
        <div class="control-label" style="gap: 8px;">
          <span>Video Control</span>
            <button id="videoPlayPauseBtn" class="toggle-button" style="width: 60px; min-width: 60px;" title="Play/Pause video">
                <i class="fas fa-play"></i>
            </button>
        </div>
      </div>

      <div class="control-group">
        <div class="control-label" style="gap: 8px;">
          <span>URL</span>
          <input 
            type="text" 
            id="videoUrlInput" 
            placeholder="Paste video URL..."
            value="https://www.shutterstock.com/shutterstock/videos/4018923955/preview/stock-footage-green-landscape-view-of-trees-in-forest.webm"
            style="flex: 1; height: 22px;padding: 6px 10px; border-radius: 20px; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 12px;"
          >
          <button id="videoLoadBtn" class="toggle-button" style="min-width: 60px;" title="Load video">
            <i class="fas fa-download"></i> 
          </button>
        </div>
      </div>

      <div class="control-group" id="videoControls" style="display: none;"></div>

      <div class="control-group" id="videoProgressGroup" style="display: none;"></div>

      <div class="presets">
        <button class="preset-btn" data-preset="light"><i class="fas fa-cloud-sun"></i> Light Rain</button>
        <button class="preset-btn" data-preset="heavy"><i class="fas fa-cloud-rain"></i> Heavy Rain</button>
        <button class="preset-btn" data-preset="storm"><i class="fas fa-bolt"></i> Storm</button>
        <button class="preset-btn" data-preset="norain"><i class="fas fa-sun"></i> No Rain</button>
        <button class="preset-btn" id="changeBgBtn"><i class="fas fa-random"></i> Random Image</button>
        <button class="preset-btn" id="customBgBtn"><i class="fas fa-image"></i> Load Image</button>
        <button class="preset-btn" id="randomVideoBtn"><i class="fas fa-film"></i> Random Video</button>
        <button class="preset-btn" id="videoUploadBtn"><i class="fas fa-video"></i> Load Video</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/SardineFish/raindrop-fx@master/bundle/index.js"></script>
  <script>
    (async function() {
      const canvas = document.querySelector("#canvas");
      const loadingEl = document.getElementById("loading");
      const dropzone = document.getElementById("dropzone");
      const root = document.getElementById("root");
      const fullscreenBtn = document.getElementById("fullscreenBtn");
      let raindropFx = null;

      // Cleanup tracking
      let currentAnimationFrameId = null;
      const eventListeners = new Map();

      // Helper function to add and track event listeners
      function addTrackedListener(element, event, handler, options) {
        if (!eventListeners.has(element)) {
          eventListeners.set(element, []);
        }
        element.addEventListener(event, handler, options);
        eventListeners.get(element).push({ event, handler, options });
      }

      // Cleanup all event listeners
      function cleanupEventListeners() {
        for (const [element, listeners] of eventListeners) {
          listeners.forEach(({ event, handler, options }) => {
            element.removeEventListener(event, handler, options);
          });
        }
        eventListeners.clear();
      }

      // Cleanup animation frame
      function cancelAnimationFrame() {
        if (currentAnimationFrameId) {
          window.cancelAnimationFrame(currentAnimationFrameId);
          currentAnimationFrameId = null;
        }
      }

      // Cleanup video resources
      function cleanupVideoResources() {
        const videoElement = document.getElementById('backgroundVideo');
        if (videoElement) {
          videoElement.pause();
          videoElement.src = '';
          videoElement.onloadedmetadata = null;
          videoElement.onerror = null;
          videoElement.onplay = null;
          videoElement.onpause = null;
          videoElement.onended = null;
        }
      }

      // Zoom variables
      let scale = 1;
      const minScale = 0.5;
      const maxScale = 5;

      // กำหนดขนาดให้เล็กกว่าความละเอียดวิดีโอจริง
      const MAX_VIDEO_WIDTH = 640;   // ลดจาก full width
      const MAX_VIDEO_HEIGHT = 360;  // ลดจาก full height

      // Curated Videos Array
      const curatedVideos = [
        'https://www.shutterstock.com/shutterstock/videos/4018923955/preview/stock-footage-green-landscape-view-of-trees-in-forest.webm',
        'https://www.shutterstock.com/shutterstock/videos/3838797647/preview/stock-footage-fresh-green-giant-bamboo-leaves-with-rain-drop-nature-background-raindrops-falling-on-bamboo.webm',
        'https://videos.pexels.com/video-files/32221425/13742369_1080_1920_30fps.mp4'
      ];

      let dynamicVideos = [...curatedVideos]; // เริ่มต้นด้วยค่าเดิม

      // ดึง links จาก GitHub
      async function loadVideosFromGithub() {
        try {
          const response = await fetch('https://raw.githubusercontent.com/maplemonday/rain/refs/heads/main/vid_for_rain.txt');
          const text = await response.text();
          // แยก lines และกรอง empty lines
          const videos = text.split('\n').filter(line => line.trim().length > 0);
          if (videos.length > 0) {
            dynamicVideos = videos;
            console.log('Loaded videos from GitHub:', dynamicVideos.length);
          }
        } catch(err) {
          console.error('Failed to load videos from GitHub:', err);
          // ใช้ค่าเดิมถ้า fetch ล้มเหลว
        }
      }

      // Fullscreen function
      async function enterFullscreen() {
        try {
          if (root.requestFullscreen) {
            await root.requestFullscreen();
          } else if (root.webkitRequestFullscreen) {
            await root.webkitRequestFullscreen();
          } else if (root.mozRequestFullScreen) {
            await root.mozRequestFullScreen();
          } else if (root.msRequestFullscreen) {
            await root.msRequestFullscreen();
          }
          fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i> Exit Fullscreen';
        } catch (err) {
          console.log('Fullscreen request failed:', err);
        }
      }

      function exitFullscreen() {
        if (document.fullscreenElement || document.webkitFullscreenElement) {
          if (document.exitFullscreen) {
            document.exitFullscreen();
          } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
          } else if (document.mozCancelFullScreen) {
            document.mozCancelFullScreen();
          } else if (document.msExitFullscreen) {
            document.msExitFullscreen();
          }
        }
        fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i> Enter Fullscreen';
      }

      // Fullscreen button click
      addTrackedListener(fullscreenBtn, 'click', () => {
        if (document.fullscreenElement || document.webkitFullscreenElement) {
          exitFullscreen();
        } else {
          enterFullscreen();
        }
      });

      // Listen for fullscreen changes
      addTrackedListener(document, 'fullscreenchange', () => {
        if (!document.fullscreenElement) {
          fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i> Enter Fullscreen';
        }
      });

      addTrackedListener(document, 'webkitfullscreenchange', () => {
        if (!document.webkitFullscreenElement) {
          fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i> Enter Fullscreen';
        }
      });

      function handleDragLeave(e){
        e.preventDefault();
        e.stopPropagation();
        if (e.target === dropzone) {
          dropzone.classList.remove('active');
        }
      }

      addTrackedListener(document, 'dragleave', handleDragLeave);

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        if (raindropFx && typeof raindropFx.resize === "function") {
          raindropFx.resize(rect.width, rect.height);
        }
      }
      addTrackedListener(window, "resize", resizeCanvas);
      resizeCanvas();

      function getRandomImageUrl() {
        // const width = Math.min(window.innerWidth, 1920);
        // const height = Math.min(window.innerHeight, 1080);
        return `https://picsum.photos/300/300?random=${Math.random()}`;
      }

      async function loadImage(url) {
        loadingEl.style.display = 'flex';
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.onload = () => {
            loadingEl.style.display = 'none';
            resolve(img);
          };
          img.onerror = () => {
            loadingEl.style.display = 'none';
            reject(new Error("Image load failed"));
          };
          img.src = url;
        });
      }

      async function startWithRetry(url) {
        const changeBgBtn = document.getElementById('changeBgBtn');
        changeBgBtn.disabled = true;
        
        let attempt = 0;
        while (true) {
          attempt++;
          const finalUrl = url || getRandomImageUrl();
          try {
            const img = await loadImage(finalUrl);
            
            if (raindropFx) {
              await raindropFx.setBackground(img);
            } else {
              raindropFx = new RaindropFX({
                canvas: canvas,
                background: img,
                dropletsPerSecond: 1000,
                spawnSize: [30, 80],
                spawnInterval: [0.1, 0.2],
                slipRate: 0.5,
                motionInterval: [0.5, 1.0],
                xShifting: [0.02, 0.08],
                colliderSize: 0.9,
                trailDropDensity: 0.2,
                trailDropSize: [0.3, 0.5],
                trailDistance: [30, 50],
                trailSpread: 0.5,
                initialSpread: 0.5,
                shrinkRate: 0.015,
                velocitySpread: 0.3,
                evaporate: 20,
                gravity: 2400,
                backgroundBlurSteps: 3,
                mist: true,
                mistColor: [0.01, 0.01, 0.01, 1],
                mistTime: 0.5,
                mistBlurStep: 4,
                dropletSize: [5, 20], // default [10, 30]
                smoothRaindrop: [0.97, 1.0],
                refractBase: 0.6, // default 0.4
                refractScale: 0.8, // default 0.6
                raindropCompose: "smoother",
                raindropLightPos: [-1, 1, 2, 0],
                raindropDiffuseLight: [0.3, 0.3, 0.3],
                raindropShadowOffset: 0.7,
                raindropEraserSize: [0.95, 1.0], // default [0.93, 1.0]
                raindropSpecularLight: [0, 0, 0],
                raindropSpecularShininess: 32,
                raindropLightBump: 0.6
              });
              raindropFx.start();
              setupControls();
            }
            
            scale = 1;
            if (raindropFx.setScale) raindropFx.setScale(scale);
            
            changeBgBtn.disabled = false;
            break;
          } catch(err) {
            console.warn(`Attempt #${attempt} failed:`, err);
            await new Promise(resolve => setTimeout(resolve, 500));
          }
        }
      }

      // Setup Controls
      let hidePanelTimeout;
      const controlPanel = document.querySelector('.control-panel');

      function showPanel() {
        controlPanel.classList.add('show');
      }

      function hidePanel() {
        controlPanel.classList.remove('show');
      }

      function setupControls() {
        // Panel visibility control - only show on hover/touch
        addTrackedListener(controlPanel, 'mouseenter', showPanel);
        addTrackedListener(controlPanel, 'mouseleave', hidePanel);

        // Show panel when interacting with controls
        const allControls = controlPanel.querySelectorAll('input, button');
        allControls.forEach(control => {
          addTrackedListener(control, 'focus', showPanel);
        });


        // Toggle panel when clicking gear icon or header
        // Droplets per second
        // Droplets per second
        const dropletsSlider = document.getElementById('dropletsPerSecond');
        const dropletsValue = document.getElementById('dropletsPerSecondValue');
        
        addTrackedListener(dropletsSlider, 'input', () => {
          const value = parseInt(dropletsSlider.value);
          dropletsValue.textContent = value;
          raindropFx.options.dropletsPerSecond = value;
        });

        // Spawn size
        const spawnSizeSlider = document.getElementById('spawnSize');
        const spawnSizeValue = document.getElementById('spawnSizeValue');
        
        addTrackedListener(spawnSizeSlider, 'input', () => {
          const value = parseInt(spawnSizeSlider.value);
          const min = Math.max(10, value - 25);
          const max = Math.min(200, value + 25);
          spawnSizeValue.textContent = `[${min}, ${max}]`;
          raindropFx.options.spawnSize = [min, max];
        });

        // Slip rate
        const slipRateSlider = document.getElementById('slipRate');
        const slipRateValue = document.getElementById('slipRateValue');
        
        addTrackedListener(slipRateSlider, 'input', () => {
          const value = parseFloat(slipRateSlider.value) / 100;
          slipRateValue.textContent = value.toFixed(2);
          raindropFx.options.slipRate = value;
        });

        // Gravity
        const gravitySlider = document.getElementById('gravity');
        const gravityValue = document.getElementById('gravityValue');
        
        addTrackedListener(gravitySlider, 'input', () => {
          const value = parseInt(gravitySlider.value);
          gravityValue.textContent = value;
          raindropFx.options.gravity = value;
        });

        // Mist toggle
        const mistToggle = document.getElementById('mistToggle');
        
        function updateMistToggle() {
          if (!raindropFx) return;
          const mistToggle = document.getElementById('mistToggle');
          mistToggle.classList.toggle('active', raindropFx.options.mist);
          mistToggle.textContent = raindropFx.options.mist ? 'ON' : 'OFF';
        }

        addTrackedListener(mistToggle, 'click', () => {
          raindropFx.options.mist = !raindropFx.options.mist;
          if (raindropFx.options.mist) {
            // Reset mist settings when turning on
            raindropFx.options.mistColor = [0.02, 0.02, 0.02, 0.8];
            raindropFx.options.mistTime = 0.5;
            raindropFx.options.mistBlurStep = 4;
          }
          updateMistToggle();
        });

        // Initialize toggle state
        updateMistToggle();

        // Presets
        document.querySelectorAll('.preset-btn').forEach(button => {
          const preset = button.dataset.preset;
          if (preset) {
            addTrackedListener(button, 'click', () => applyPreset(preset));
          }
        });
      }   

      let currentPreset = null;
      
      function applyPreset(preset) {
        currentPreset = preset;
        // Update active state of buttons
        document.querySelectorAll('.preset-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.preset === preset);
        });
        switch(preset) {
          case 'light':
            raindropFx.options.dropletsPerSecond = 300;
            raindropFx.options.spawnSize = [15, 40];
            raindropFx.options.slipRate = 0.3;
            raindropFx.options.gravity = 2000;
            break;
          case 'heavy':
            raindropFx.options.dropletsPerSecond = 1500;
            raindropFx.options.spawnSize = [50, 100];
            raindropFx.options.slipRate = 0.7;
            raindropFx.options.gravity = 2800;
            break;
          case 'storm':
            raindropFx.options.dropletsPerSecond = 2500;
            raindropFx.options.spawnSize = [60, 150];
            raindropFx.options.slipRate = 0.9;
            raindropFx.options.gravity = 3500;
            break;
          case 'norain':
            // Immediately set rain to zero
            document.getElementById('dropletsPerSecond').value = 0;
            document.getElementById('dropletsPerSecondValue').textContent = '0';
            raindropFx.options.dropletsPerSecond = 0;
            
            document.getElementById('spawnSize').value = 10;
            document.getElementById('spawnSizeValue').textContent = '[0, 0]';
            raindropFx.options.spawnSize = [0, 0];
            currentPreset = 'norain';
            break;
        }
        updateSliderValues();
      }
 
      function updateSliderValues() {
        if (!raindropFx) return;
        
        document.getElementById('dropletsPerSecond').value = raindropFx.options.dropletsPerSecond;
        document.getElementById('dropletsPerSecondValue').textContent = raindropFx.options.dropletsPerSecond;
        
        const spawnSize = raindropFx.options.spawnSize;
        const spawnSizeAvg = Math.round((spawnSize[0] + spawnSize[1]) / 2);
        document.getElementById('spawnSize').value = spawnSizeAvg;
        document.getElementById('spawnSizeValue').textContent = `[${spawnSize[0]}, ${spawnSize[1]}]`;
        
        document.getElementById('slipRate').value = raindropFx.options.slipRate * 100;
        document.getElementById('slipRateValue').textContent = raindropFx.options.slipRate.toFixed(2);
        
        document.getElementById('gravity').value = raindropFx.options.gravity;
        document.getElementById('gravityValue').textContent = raindropFx.options.gravity;
        
        // Force update mist toggle
        const mistToggle = document.getElementById('mistToggle');
        mistToggle.classList.toggle('active', raindropFx.options.mist);
        mistToggle.textContent = raindropFx.options.mist ? 'ON' : 'OFF';
      }

      // Change background button
      addTrackedListener(document.getElementById('changeBgBtn'), 'click', () => {
        loadingEl.style.display = 'flex';
        startWithRetry();
      });

      // Custom background button
      const bgFileInput = document.createElement('input');
      bgFileInput.type = 'file';
      bgFileInput.accept = 'image/*';
      bgFileInput.style.display = 'none';
      document.body.appendChild(bgFileInput);

      addTrackedListener(document.getElementById('customBgBtn'), 'click', (e) => {
        e.stopPropagation(); // Prevent triggering canvas click
        bgFileInput.click();
      });

      addTrackedListener(bgFileInput, 'change', function(e) {
        e.stopPropagation();
        const file = bgFileInput.files[0];
        if(file){
          const reader = new FileReader();
          reader.onload = function(e){
            startWithRetry(e.target.result);
          }
          reader.readAsDataURL(file);
        }
      });

      // Video element setup
      const videoElement = document.getElementById('backgroundVideo');
      let isVideoMode = false;
      let videoCanvas = null;
      let videoCanvasCtx = null;

      // Initialize video canvas for rendering video to texture
      function initVideoCanvas() {
        if (!videoCanvas) {
          videoCanvas = document.createElement('canvas');
          videoCanvasCtx = videoCanvas.getContext('2d');
          
          // รอให้วิดีโอโหลด metadata ก่อนแล้วค่อยกำหนดขนาด
          // แต่ตั้งค่าเริ่มต้นให้เล็ก
          videoCanvas.width = 320;
          videoCanvas.height = 240;
        }
      }

      function updateVideoFrame() {
        if (isVideoMode && videoElement && videoCanvas && videoCanvasCtx) {
          // Check if video is ready to be drawn
          if (videoElement.readyState === videoElement.HAVE_FUTURE_DATA || videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
            try {
              videoCanvasCtx.drawImage(videoElement, 0, 0, videoCanvas.width, videoCanvas.height);
              if (raindropFx && typeof raindropFx.setBackground === 'function') {
                raindropFx.setBackground(videoCanvas);
              }
            } catch(err) {
              console.error('Canvas drawImage error:', err);
            }
          }
        }
        if (isVideoMode) {
          currentAnimationFrameId = requestAnimationFrame(updateVideoFrame);
        } else {
          currentAnimationFrameId = null;
        }
      }

      function enableVideoMode() {
        isVideoMode = true;
        document.getElementById('dropzoneText').textContent = 'Drop Video Here';
        updateVideoFrame();
      }

      function disableVideoMode() {
        isVideoMode = false;
        videoElement.pause();
        document.getElementById('dropzoneText').textContent = 'Drop Image Here';
      }

      // Function to update play/pause button based on video state
      function updatePlayPauseButton() {
        // No longer needed
      }

      // Video playback controls - Removed (not needed anymore)

      // Video progress control - Removed (not needed anymore)

      // Video URL loading
      function triggerShakeAnimation() {
        const controlPanel = document.querySelector('.control-panel');
        // Remove the animation class if it exists
        controlPanel.classList.remove('shake');
        // Force reflow to restart animation
        void controlPanel.offsetWidth;
        // Add the animation class
        controlPanel.classList.add('shake');
        // Remove the class after animation completes
        setTimeout(() => {
          controlPanel.classList.remove('shake');
        }, 200);
      }

      function loadVideoFromUrl(url) {
        if (!url) {
          triggerShakeAnimation();
          return;
        }
        
        console.log('Loading video from URL:', url);
        loadingEl.style.display = 'flex';
        
        // Clear any previous event handlers
        videoElement.onloadedmetadata = null;
        videoElement.onerror = null;
        
        videoElement.onloadedmetadata = function() {
          console.log('Video metadata loaded from URL:', videoElement.videoWidth, 'x', videoElement.videoHeight);
          if (videoCanvas) {
            // คำนวณขนาดใหม่ให้ไม่เกิน MAX_VIDEO_WIDTH/HEIGHT
            const maxWidth = MAX_VIDEO_WIDTH;
            const maxHeight = MAX_VIDEO_HEIGHT;
            const aspect = videoElement.videoWidth / videoElement.videoHeight;
            
            let newWidth = Math.min(videoElement.videoWidth, maxWidth);
            let newHeight = Math.min(videoElement.videoHeight, maxHeight);
            
            // รักษา aspect ratio
            if (newWidth / newHeight > aspect) {
              newWidth = newHeight * aspect;
            } else {
              newHeight = newWidth / aspect;
            }
            
            videoCanvas.width = Math.floor(newWidth);
            videoCanvas.height = Math.floor(newHeight);
            console.log('Canvas resized to:', videoCanvas.width, 'x', videoCanvas.height);
          }
          loadingEl.style.display = 'none';
          initVideoCanvas();
          isVideoMode = true;
          
          // Permanently mute video
          videoElement.muted = true;
          videoElement.volume = 0;
          videoElement.loop = true;
          
          console.log('Starting video playback from URL');
          videoElement.play().catch(err => console.error('Video autoplay prevented:', err));
          updateVideoFrame();
        };

        videoElement.onerror = function() {
          loadingEl.style.display = 'none';
          console.error('Video load error:', videoElement.error);
          alert('Failed to load video from URL.\nError: ' + (videoElement.error ? videoElement.error.message : 'Unknown error') + '\n\nTIP: Check if:\n- URL is valid\n- Video server supports CORS\n- File format is supported');
        };

        // Set crossOrigin for CORS support
        videoElement.crossOrigin = 'anonymous';
        videoElement.src = url;
        console.log('Video src set, calling load()');
        videoElement.load();
      }

      // Play button - load video from URL
      const videoLoadBtn = document.getElementById('videoLoadBtn');
      addTrackedListener(videoLoadBtn, 'click', () => {
        const url = document.getElementById('videoUrlInput').value.trim();
        loadVideoFromUrl(url);
      });

      // Play/Pause button - toggle video playback
      const videoPlayPauseBtn = document.getElementById('videoPlayPauseBtn');
      addTrackedListener(videoPlayPauseBtn, 'click', () => {
        if (!isVideoMode || !videoElement) {
          triggerShakeAnimation();
          return;
        }
        
        if (videoElement.paused) {
          videoElement.play().catch(err => console.error('Play error:', err));
          videoPlayPauseBtn.innerHTML = '<i class="fas fa-pause"></i> ';
        } else {
          videoElement.pause();
          videoPlayPauseBtn.innerHTML = '<i class="fas fa-play"></i> ';
        }
      });

      // Update button state when video is loaded
      addTrackedListener(videoElement, 'play', () => {
        videoPlayPauseBtn.innerHTML = '<i class="fas fa-pause"></i> ';
      });

      addTrackedListener(videoElement, 'pause', () => {
        videoPlayPauseBtn.innerHTML = '<i class="fas fa-play"></i> ';
      });

      addTrackedListener(videoElement, 'ended', () => {
        videoPlayPauseBtn.innerHTML = '<i class="fas fa-play"></i> ';
      });

      // Allow Enter key in URL input
      addTrackedListener(document.getElementById('videoUrlInput'), 'keypress', (e) => {
        if (e.key === 'Enter') {
          const url = document.getElementById('videoUrlInput').value.trim();
          loadVideoFromUrl(url);
        }
      });

      // Random Video button
      addTrackedListener(document.getElementById('randomVideoBtn'), 'click', () => {
        const randomVideoUrl = dynamicVideos[Math.floor(Math.random() * dynamicVideos.length)];
        loadVideoFromUrl(randomVideoUrl);
      });

      // Load Video button
      const videoFileInput = document.createElement('input');
      videoFileInput.type = 'file';
      videoFileInput.accept = 'video/*';
      videoFileInput.style.display = 'none';
      document.body.appendChild(videoFileInput);

      addTrackedListener(document.getElementById('videoUploadBtn'), 'click', (e) => {
        e.stopPropagation();
        videoFileInput.click();
      });

      addTrackedListener(videoFileInput, 'change', function(e) {
        e.stopPropagation();
        const file = videoFileInput.files[0];
        if(file){
          console.log('Loading video file:', file.name);
          const reader = new FileReader();
          
          reader.onerror = function() {
            loadingEl.style.display = 'none';
            alert('Failed to read video file');
            console.error('FileReader error');
          };
          
          reader.onload = function(readerEvent){
            loadingEl.style.display = 'flex';
            console.log('FileReader complete, setting video src');
            
            // Clear any previous event handlers
            videoElement.onloadedmetadata = null;
            videoElement.onerror = null;
            
            videoElement.onloadedmetadata = function() {
              console.log('Video metadata loaded:', videoElement.videoWidth, 'x', videoElement.videoHeight);
              // Update video canvas size to match video
              if (videoCanvas) {
                // คำนวณขนาดใหม่ให้ไม่เกิน MAX_VIDEO_WIDTH/HEIGHT
                const maxWidth = MAX_VIDEO_WIDTH;
                const maxHeight = MAX_VIDEO_HEIGHT;
                const aspect = videoElement.videoWidth / videoElement.videoHeight;
                
                let newWidth = Math.min(videoElement.videoWidth, maxWidth);
                let newHeight = Math.min(videoElement.videoHeight, maxHeight);
                
                // รักษา aspect ratio
                if (newWidth / newHeight > aspect) {
                  newWidth = newHeight * aspect;
                } else {
                  newHeight = newWidth / aspect;
                }
                
                videoCanvas.width = Math.floor(newWidth);
                videoCanvas.height = Math.floor(newHeight);
                console.log('Canvas resized to:', videoCanvas.width, 'x', videoCanvas.height);
              }
              
              loadingEl.style.display = 'none';
              initVideoCanvas();
              isVideoMode = true;
              
              // Permanently mute video
              videoElement.muted = true;
              videoElement.volume = 0;
              videoElement.loop = true;
              
              console.log('Starting video playback');
              videoElement.play().catch(err => console.error('Video autoplay prevented:', err));
              updateVideoFrame();
            };
            
            videoElement.onerror = function(err) {
              loadingEl.style.display = 'none';
              console.error('Video error:', err, videoElement.error);
              alert('Failed to load video file: ' + (videoElement.error ? videoElement.error.message : 'Unknown error'));
            };
            
            videoElement.src = readerEvent.target.result;
            console.log('Video src set, calling load()');
            videoElement.load();
          };
          
          reader.readAsDataURL(file);
        }
      });

      // Drag & drop for videos and images
      addTrackedListener(document, 'dragover', (e) => {
        if (e.dataTransfer.types.includes('Files')) {
          e.preventDefault();
          e.stopPropagation();
          dropzone.classList.add('active');
        }
      });

      // Start first time
      await startWithRetry();
      // Set initial preset to light rain
      applyPreset('heavy');
      // Panel starts hidden by default
      
      // โหลด videos จาก GitHub
      loadVideosFromGithub();

      // Zoom with wheel
      let lastTouchDist = null;

      addTrackedListener(canvas, 'wheel', function(e) {
        e.preventDefault();
        const delta = -e.deltaY * 0.001;
        scale *= (1 + delta);
        scale = Math.min(Math.max(scale, minScale), maxScale);

        if (raindropFx && typeof raindropFx.setScale === 'function') {
          raindropFx.setScale(scale);
        }
      }, { passive: false });

      // Pinch zoom for mobile
      addTrackedListener(canvas, 'touchmove', function(e) {
        if (e.touches.length === 2) {
          e.preventDefault();
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (lastTouchDist) {
            const delta = dist / lastTouchDist;
            scale *= delta;
            scale = Math.min(Math.max(scale, minScale), maxScale);

            if (raindropFx && typeof raindropFx.setScale === 'function') {
              raindropFx.setScale(scale);
            }
          }
          lastTouchDist = dist;
        }
      }, { passive: false });

      addTrackedListener(canvas, 'touchend', function(e){
        if(e.touches.length < 2) lastTouchDist = null;
      });

      // Long-press for file picker
      let pressTimer;
      addTrackedListener(canvas, 'touchstart', (e) => {
        if(e.touches.length === 1){
          pressTimer = setTimeout(() => {
            bgFileInput.click();
          }, 600);
        }
      });

      addTrackedListener(canvas, 'touchend', (e) => {
        clearTimeout(pressTimer);
      });

      addTrackedListener(canvas, 'touchmove', (e) => {
        clearTimeout(pressTimer);
      });

      // Single tap -> random image and hide panel
      addTrackedListener(canvas, 'click', (e) => {
        if (!pressTimer && !lastTouchDist && e.target === canvas) {
          startWithRetry();
        }
      });


      // Drag & Drop
      function handleDrop(e){
        e.preventDefault();
        e.stopPropagation();
        dropzone.classList.remove('active');
        
        if(e.dataTransfer.files && e.dataTransfer.files.length > 0){
          const file = e.dataTransfer.files[0];
          
          // Handle video files
          if(file.type.startsWith('video/')){
            console.log('Drag & drop video file:', file.name);
            const reader = new FileReader();
            reader.onload = ev => {
              loadingEl.style.display = 'flex';
              
              videoElement.onloadedmetadata = function() {
                // คำนวณขนาดใหม่ให้ไม่เกิน MAX_VIDEO_WIDTH/HEIGHT
                const maxWidth = MAX_VIDEO_WIDTH;
                const maxHeight = MAX_VIDEO_HEIGHT;
                const aspect = videoElement.videoWidth / videoElement.videoHeight;
                
                let newWidth = Math.min(videoElement.videoWidth, maxWidth);
                let newHeight = Math.min(videoElement.videoHeight, maxHeight);
                
                // รักษา aspect ratio
                if (newWidth / newHeight > aspect) {
                  newWidth = newHeight * aspect;
                } else {
                  newHeight = newWidth / aspect;
                }
                
                videoCanvas.width = Math.floor(newWidth);
                videoCanvas.height = Math.floor(newHeight);
                loadingEl.style.display = 'none';
                initVideoCanvas();
                isVideoMode = true;
                
                // Permanently mute video
                videoElement.muted = true;
                videoElement.volume = 0;
                
                videoElement.play().catch(err => console.error('Video autoplay prevented:', err));
                updateVideoFrame();
              };
              
              videoElement.onerror = function() {
                loadingEl.style.display = 'none';
                alert('Failed to load video file');
                console.error('Video error:', videoElement.error);
              };
              
              videoElement.src = ev.target.result;
              videoElement.load();
            };
            reader.readAsDataURL(file);
            return;
          }
          
          // Handle image files
          if(file.type.startsWith('image/')){
            const reader = new FileReader();
            reader.onload = ev => startWithRetry(ev.target.result);
            reader.readAsDataURL(file);
          }
          return;
        }
        const url = e.dataTransfer.getData('URL') || e.dataTransfer.getData('text/plain');
        if(url && (url.startsWith('http://') || url.startsWith('https://'))){
          startWithRetry(url);
        }
      }

      function handleDragOver(e){
        e.preventDefault();
        e.stopPropagation();
        dropzone.classList.add('active');
      }

      function handleDragLeave(e){
        e.preventDefault();
        e.stopPropagation();
        if (e.target === dropzone) {
          dropzone.classList.remove('active');
        }
      }

      addTrackedListener(document, 'dragover', handleDragOver);
      addTrackedListener(document, 'drop', handleDrop);
      addTrackedListener(document, 'dragleave', handleDragLeave);
      
      // Cleanup on page unload
      addTrackedListener(window, 'unload', () => {
        cleanupVideoResources();
        cancelAnimationFrame();
        cleanupEventListeners();
        if (raindropFx && typeof raindropFx.stop === 'function') {
          raindropFx.stop();
        }
        raindropFx = null;
      });
    })();

          function requestFullscreen() {
        const root = document.getElementById('root');
        if (root.requestFullscreen) {
          root.requestFullscreen().catch(err => console.log('Fullscreen request failed:', err));
        } else if (root.webkitRequestFullscreen) {
          root.webkitRequestFullscreen();
        } else if (root.webkitEnterFullscreen) {
          root.webkitEnterFullscreen();
        }
      }

      // Request fullscreen on first interaction for mobile
      function enableFullscreenOnMobile() {
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobile) {
          addTrackedListener(canvas, 'click', requestFullscreen, { once: true });
          addTrackedListener(document, 'touchstart', requestFullscreen, { once: true });
        }
      }

      enableFullscreenOnMobile();

  </script>
</body>
